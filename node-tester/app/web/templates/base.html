{% set _ing = request.headers.get('x-ingress-path', '') %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <base href="{{ _ing }}/">
  <title>{% block title %}Node Tester{% endblock %}</title>
  <style>
    :root {
      --bg: #f1f5f9; --s: #fff; --b: #e2e8f0;
      --p: #3b82f6; --ph: #1d4ed8;
      --ok: #15803d; --ok-bg: #f0fdf4; --ok-b: #86efac;
      --err: #dc2626; --err-bg: #fef2f2; --err-b: #fca5a5;
      --warn: #b45309; --warn-bg: #fffbeb; --warn-b: #fcd34d;
      --t: #0f172a; --m: #64748b; --r: 8px;
      --sh: 0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.05);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font: 14px/1.5 -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; color: var(--t); background: var(--bg); min-height: 100vh; }
    a { color: var(--p); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Header ── */
    header { background: var(--s); border-bottom: 1px solid var(--b); height: 52px; display: flex; align-items: center; padding: 0 24px; gap: 8px; position: sticky; top: 0; z-index: 10; box-shadow: 0 1px 0 var(--b); }
    .logo { font-size: 15px; font-weight: 700; color: var(--t); letter-spacing: -.3px; margin-right: 8px; }
    .logo span { color: var(--p); }
    nav { display: flex; gap: 2px; }
    nav a { padding: 6px 12px; border-radius: 6px; color: var(--m); font-size: 13px; font-weight: 500; transition: background .12s, color .12s; }
    nav a:hover { background: var(--bg); color: var(--t); text-decoration: none; }
    nav a.active { background: #eff6ff; color: var(--p); }

    /* ── Layout ── */
    main { max-width: 860px; margin: 28px auto; padding: 0 20px 48px; }
    .page-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .page-sub { color: var(--m); font-size: 13px; margin-bottom: 24px; }

    /* ── Card ── */
    .card { background: var(--s); border: 1px solid var(--b); border-radius: var(--r); box-shadow: var(--sh); padding: 20px; margin-bottom: 16px; }
    .card-title { font-size: 11px; font-weight: 700; color: var(--m); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 16px; }

    /* ── Grid ── */
    .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .g3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    @media (max-width: 600px) { .g2, .g3 { grid-template-columns: 1fr; } }

    /* ── Form ── */
    .fg { margin-bottom: 16px; }
    .fg:last-child { margin-bottom: 0; }
    label { display: block; font-size: 11px; font-weight: 700; color: var(--m); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 5px; }
    input[type=text], input[type=password], input[type=number], select {
      width: 100%; padding: 8px 11px; border: 1px solid var(--b); border-radius: 6px;
      font-size: 14px; color: var(--t); background: var(--s); outline: none;
      transition: border-color .15s, box-shadow .15s; appearance: none;
    }
    input:focus, select:focus { border-color: var(--p); box-shadow: 0 0 0 3px rgba(59,130,246,.12); }
    .hint { font-size: 11px; color: var(--m); margin-top: 5px; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .row3 { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 16px; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 8px 16px; border-radius: 6px; border: 1px solid transparent;
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: background .12s, border-color .12s, opacity .12s; white-space: nowrap;
    }
    .btn:active:not(:disabled) { transform: scale(.98); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn-primary { background: var(--p); color: #fff; border-color: var(--p); }
    .btn-primary:hover:not(:disabled) { background: var(--ph); border-color: var(--ph); }
    .btn-ghost { background: var(--s); color: var(--t); border-color: var(--b); }
    .btn-ghost:hover:not(:disabled) { background: var(--bg); }

    /* ── Alerts ── */
    .alert { padding: 11px 14px; border-radius: var(--r); font-size: 13px; border: 1px solid transparent; }
    .alert-ok  { background: var(--ok-bg);   border-color: var(--ok-b);   color: var(--ok);   }
    .alert-err { background: var(--err-bg);  border-color: var(--err-b);  color: var(--err);  }
    .alert-warn{ background: var(--warn-bg); border-color: var(--warn-b); color: var(--warn); }
    .alert-info{ background: #eff6ff; border-color: #bfdbfe; color: #1e40af; }

    /* ── Badges ── */
    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; }
    .badge-ok   { background: var(--ok-bg);  color: var(--ok);  }
    .badge-err  { background: var(--err-bg); color: var(--err); }
    .badge-gray { background: var(--bg); color: var(--m); border: 1px solid var(--b); }
    .badge-blue { background: #eff6ff; color: var(--p); }

    /* ── Status dot ── */
    .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .dot-ok  { background: #22c55e; box-shadow: 0 0 0 3px #dcfce7; }
    .dot-err { background: var(--err); box-shadow: 0 0 0 3px var(--err-bg); }
    .dot-gray{ background: #cbd5e1; }

    /* ── Connection status card ── */
    .status-row { display: flex; align-items: center; gap: 12px; }
    .status-label { font-size: 14px; font-weight: 600; }
    .status-meta  { font-size: 12px; color: var(--m); margin-top: 2px; }
    .status-right { margin-left: auto; display: flex; gap: 6px; align-items: center; }

    /* ── Node tags ── */
    .node-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .node-tag { background: var(--bg); border: 1px solid var(--b); border-radius: 5px; padding: 3px 10px; font-size: 12px; color: var(--m); font-family: ui-monospace, monospace; }

    /* ── Empty state ── */
    .empty { text-align: center; padding: 60px 20px; color: var(--m); }
    .empty-icon { font-size: 44px; margin-bottom: 14px; opacity: .5; }
    .empty h3 { font-size: 16px; font-weight: 600; color: var(--t); margin-bottom: 8px; }
    .empty p  { font-size: 13px; max-width: 320px; margin: 0 auto; }

    /* ── Test action cards ── */
    .test-card { display: flex; flex-direction: column; }
    .test-card p { font-size: 13px; color: var(--m); flex: 1; margin-bottom: 12px; }
    .test-meta { display: flex; gap: 12px; font-size: 12px; color: var(--m); margin-bottom: 16px; }
    .test-meta span { display: flex; align-items: center; gap: 4px; }

    /* ── Misc ── */
    .sep { border: none; border-top: 1px solid var(--b); margin: 20px 0; }
    .hidden { display: none !important; }
    .mt8 { margin-top: 8px; }
    .mt12 { margin-top: 12px; }
    .mt16 { margin-top: 16px; }

    /* ── Spinner ── */
    .spin { width: 13px; height: 13px; border: 2px solid rgba(255,255,255,.35); border-top-color: #fff; border-radius: 50%; animation: _s .55s linear infinite; flex-shrink: 0; }
    .spin-dark { border-color: rgba(0,0,0,.1); border-top-color: var(--p); }
    @keyframes _s { to { transform: rotate(360deg); } }
  </style>
  <script>
  (function(){
    var ing = {{ _ing | tojson }};
    if (!ing) return;
    var _f = window.fetch;
    window.fetch = function(url){
      if (typeof url === 'string' && url[0] === '/') url = ing + url;
      return _f.apply(this, arguments);
    };
    var _E = window.EventSource;
    window.EventSource = function(url, opts){
      if (typeof url === 'string' && url[0] === '/') url = ing + url;
      return new _E(url, opts);
    };
  })();
  </script>
</head>
<body>
<header>
  <a class="logo" href="./">Node<span>Tester</span></a>
  <nav>
    <a href="./" class="{{ 'active' if page == 'dashboard' else '' }}">Dashboard</a>
    <a href="charts" class="{{ 'active' if page == 'charts' else '' }}">Charts</a>
    <a href="settings" class="{{ 'active' if page == 'settings' else '' }}">Settings</a>
  </nav>
</header>
<main>
  {% block content %}{% endblock %}
</main>
</body>
</html>
